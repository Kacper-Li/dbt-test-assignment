version: 2

sources:
  - name: raw
    description: >
      Single denormalized landing extract. Normalize into dims/facts in dbt;
      do not treat this file as the analytical model.
    meta:
      external_location: "read_csv_auto('data/raw/{name}.csv')"
    tables:
      - name: consolidated_transactions
        description: >
          Wide sales extract with repeated product/store/region attributes.
          Transaction ID is not unique; cost columns may disagree.
        columns:
          - name: Transaction ID
          - name: Transaction Date
          - name: quantity
          - name: unit_price
          - name: unit_cost
          - name: standard_unit_cost
          - name: landed_unit_cost
          - name: pack_size
          - name: Product index
          - name: Product Name
          - name: product_name_catalog
          - name: product_category
          - name: Store ID
          - name: store_name
          - name: state_code
          - name: region_name
          - name: source_system
          - name: ingested_at
