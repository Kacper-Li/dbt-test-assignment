version: 2

models:
  - name: fact_profit_opportunities
    description: >
      Mart for surfacing product-store combinations with the strongest margin opportunities.
    columns:
      - name: product_id
        description: Product identifier from the intermediate product model.
      - name: store_id
        description: Store identifier from the intermediate store model.
      - name: gross_margin
        description: Gross margin generated by the product-store combination.
      - name: gross_margin_pct
        description: Gross margin as a percentage of gross cost.
